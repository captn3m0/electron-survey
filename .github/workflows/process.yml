name: Process apps

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

# Don't let a slow run pile up on the next schedule tick.
concurrency:
  group: process-apps
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: true

      - name: Free extra disk space
        run: |
          # The runner ships with ~14 GB free; reclaim the big preinstalled
          # toolchains we never use so binary downloads have headroom.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: Build meta indexes (AUR, Homebrew, Electron headers)
        run: make all

      - name: Restore zips cache
        id: cache-zips-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: zips/
          key: zips-${{ hashFiles('data/apps/**/*.yml') }}
          restore-keys: |
            zips-

      - name: Run github.com processor
        run: uv run main.py process github.com
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Copy curated download URLs
        run: uv run main.py process static-downloads

      - name: Match Homebrew casks
        run: uv run main.py process homebrew

      - name: Detect Electron from source lockfiles
        # No --source-fast: source.matches() already skips archives it has
        # detected from, and re-detects when a new release advances src.
        run: uv run main.py process source

      - name: Match AUR packages
        run: uv run main.py process aur

      - name: Detect Electron from AUR depends
        run: uv run main.py process aur-version

      # Recompute tiers before which-electron so its bounded budget is spent on
      # the most-used apps first (process._prioritize reads data/popularity.yml).
      - name: Compute popularity tiers
        run: uv run main.py popularity

      # steps/which-electron.py runs the fingerprinter as
      # `node which-electron/src/index.js` (the tool's bin script has no
      # shebang, so the npx/.bin shim gets executed by /bin/sh and dies with
      # `Syntax error: "(" unexpected`). Provision the same local checkout the
      # step expects, pinned to a fixed commit so the fingerprint epoch
      # (`we<package.json-version>`) stays stable across runs. The tool has real
      # runtime deps (@vscode/ripgrep, 7zip-bin, electron-fingerprints, …), so
      # `npm ci --omit=dev` is required for `node src/index.js` to run.
      - name: Provision which-electron fingerprinter
        run: |
          WE_REF=5fdbae4e15e27e8dd2d42714d66c250947059840  # captn3m0/which-electron main, package.json 1.2.1
          git init -q which-electron
          git -C which-electron remote add origin https://github.com/captn3m0/which-electron.git
          git -C which-electron fetch --depth 1 origin "$WE_REF"
          git -C which-electron checkout -q FETCH_HEAD
          npm --prefix which-electron ci --omit=dev

      # Downloading + fingerprinting binaries is the one unbounded-cost step, so
      # it is capped two ways to guarantee the job finishes and the commit below
      # runs (a job timeout force-cancels everything and discards the run):
      #   * WHICH_ELECTRON_DEADLINE_SECONDS — hard wall-clock budget; once spent,
      #     no new binaries are claimed and the step returns. 5400s = 90 min
      #     leaves ample headroom under the 180-min job limit for the metadata
      #     steps above and the commit/report below.
      #   * --limit — count cap for fast days when the budget isn't the governor.
      # The backlog drains across the daily schedule: the we_tried marker skips
      # binaries already fingerprinted at their current release, and popularity
      # ordering spends each run's budget on the most-used apps first.
      #
      # WHICH_ELECTRON_BACKFILL_EVIDENCE also re-claims apps this processor
      # resolved before it recorded *which* artefact answered, so their pages can
      # name the binary the version was read out of instead of saying it wasn't
      # recorded. Each app drops out permanently once its evidence lands, so this
      # is a finite ~376-app backlog on top of the unresolved queue, not a
      # standing cost. It also un-freezes their versions: a resolved app was
      # otherwise never re-read, so a binary detection never aged.
      - name: Fingerprint binaries with which-electron
        run: uv run main.py process which-electron --limit 200
        env:
          GH_TOKEN: ${{ github.token }}
          WHICH_ELECTRON_DEADLINE_SECONDS: "5400"
          WHICH_ELECTRON_BACKFILL_EVIDENCE: "1"

      - name: Save zips cache
        if: always() && steps.cache-zips-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: zips/
          key: ${{ steps.cache-zips-restore.outputs.cache-primary-key }}

      # After which-electron has resolved fresh versions, recompute tiers +
      # staleness + the rolled-up headline figures so the committed data (and
      # the docs/ site built from it) stay current.
      - name: Compute popularity tiers
        if: always()
        run: uv run main.py popularity

      # NVD is a third party and does go down; a failure here just leaves
      # yesterday's committed data/cves.yml in place, which freshness can still
      # read, so it must not take the rest of the pipeline with it.
      - name: Refresh unpatched Chromium CVE counts
        if: always()
        continue-on-error: true
        run: uv run main.py cves --refresh

      - name: Compute Electron freshness and site summary
        if: always()
        run: |
          uv run main.py freshness
          uv run main.py summary

      - name: Generate report
        if: always()
        run: uv run main.py report

      - name: Print stats
        if: always()
        run: uv run main.py stats

      - uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        if: always()
        with:
          commit_message: "chore: update release and electron version data [skip ci]"
          file_pattern: "data/apps/ data/popularity.yml data/freshness.yml data/summary.yml data/cves.yml REPORT.md"

  # [skip ci] on the commit above suppresses the push trigger, so publish
  # explicitly rather than leaving the site a day stale.
  publish:
    needs: process
    if: always()
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
