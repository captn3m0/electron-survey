name: Update app data

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Extract apps
        run: uv run main.py extract-apps

      - name: Fetch electron versions from npm
        run: uv run main.py fetch-versions

      - name: Generate report
        run: uv run main.py report

      - uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.2.0
        with:
          commit_message: "chore: update app list and electron versions [skip ci]"
          file_pattern: "data/apps/ data/versions.txt REPORT.md"
