name: Auto-merge dependabot submodule updates

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Verify only electron-apps submodule changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          UNEXPECTED=$(gh pr view "$PR_NUMBER" --json files \
            --jq '[.files[].path][]' \
            | grep -v '^repos/electron-apps$' \
            | grep -v '^\.gitmodules$' || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "Unexpected files changed, not merging:"
            echo "$UNEXPECTED"
            exit 1
          fi

      - name: Approve and auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
