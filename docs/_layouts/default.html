<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/sakura.css' | relative_url }}">
  <style>
    table { font-size: .95rem; }
    .st { display: inline-block; padding: 0 .35em; border-radius: .25em; font-weight: 600; white-space: nowrap; }
    .st-green  { background: #d6f5df; color: #12692b; }
    .st-orange { background: #ffe8c7; color: #8a4b00; }
    .st-red    { background: #ffd9d9; color: #8a0000; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a> ·
    <a href="{{ '/flagship/' | relative_url }}">Flagship</a> ·
    <a href="{{ '/popular/' | relative_url }}">Popular</a> ·
    <a href="{{ '/established/' | relative_url }}">Established</a> ·
    <a href="{{ '/minimal/' | relative_url }}">Minimal</a> ·
    <a href="{{ '/unranked/' | relative_url }}">Unranked</a>
  </nav>
  <hr>
  {{ content }}
  <hr>
  <footer><small>{{ site.description }} — generated from <code>data/</code>.</small></footer>
</body>
</html>
