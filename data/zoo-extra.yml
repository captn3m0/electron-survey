# data/zoo-extra.yml — manually curated Electron app download URLs
# For apps not covered by the GitHub releases processor, or apps whose
# download URLs are hosted outside GitHub.
# Merged into data/zoo.yml by: uv run main.py zoo

# ── Microsoft Visual Studio Code ──────────────────────────────────────────────
- id: visual-studio-code
  name: Visual Studio Code
  website: https://code.visualstudio.com/download
  packages:
    # Windows — user installer (recommended, no admin required)
    - url: https://update.code.visualstudio.com/latest/win32-x64-user/stable
      format: exe
      os: windows
      arch: x64
    - url: https://update.code.visualstudio.com/latest/win32-arm64-user/stable
      format: exe
      os: windows
      arch: arm64
    # Windows — system installer
    - url: https://update.code.visualstudio.com/latest/win32-x64/stable
      format: exe
      os: windows
      arch: x64
    - url: https://update.code.visualstudio.com/latest/win32-arm64/stable
      format: exe
      os: windows
      arch: arm64
    # Windows — MSI
    - url: https://update.code.visualstudio.com/latest/win32-x64-msi/stable
      format: msi
      os: windows
      arch: x64
    - url: https://update.code.visualstudio.com/latest/win32-arm64-msi/stable
      format: msi
      os: windows
      arch: arm64
    # Windows — zip
    - url: https://update.code.visualstudio.com/latest/win32-x64-archive/stable
      format: zip
      os: windows
      arch: x64
    - url: https://update.code.visualstudio.com/latest/win32-arm64-archive/stable
      format: zip
      os: windows
      arch: arm64
    # macOS — DMG
    - url: https://update.code.visualstudio.com/latest/darwin/stable
      format: dmg
      os: macos
      arch: x64
    - url: https://update.code.visualstudio.com/latest/darwin-arm64/stable
      format: dmg
      os: macos
      arch: arm64
    - url: https://update.code.visualstudio.com/latest/darwin-universal/stable
      format: dmg
      os: macos
      arch: universal
    # macOS — zip (x64 and arm64)
    - url: https://update.code.visualstudio.com/latest/darwin-x64-archive/stable
      format: zip
      os: macos
      arch: x64
    - url: https://update.code.visualstudio.com/latest/darwin-arm64-archive/stable
      format: zip
      os: macos
      arch: arm64
    # Linux — DEB
    - url: https://update.code.visualstudio.com/latest/linux-deb-x64/stable
      format: deb
      os: linux
      arch: x64
    - url: https://update.code.visualstudio.com/latest/linux-deb-arm64/stable
      format: deb
      os: linux
      arch: arm64
    - url: https://update.code.visualstudio.com/latest/linux-deb-armhf/stable
      format: deb
      os: linux
      arch: arm
    # Linux — RPM
    - url: https://update.code.visualstudio.com/latest/linux-rpm-x64/stable
      format: rpm
      os: linux
      arch: x64
    - url: https://update.code.visualstudio.com/latest/linux-rpm-arm64/stable
      format: rpm
      os: linux
      arch: arm64
    - url: https://update.code.visualstudio.com/latest/linux-rpm-armhf/stable
      format: rpm
      os: linux
      arch: arm
    # Linux — tar.gz
    - url: https://update.code.visualstudio.com/latest/linux-x64/stable
      format: tar.gz
      os: linux
      arch: x64
    - url: https://update.code.visualstudio.com/latest/linux-arm64/stable
      format: tar.gz
      os: linux
      arch: arm64
    - url: https://update.code.visualstudio.com/latest/linux-armhf/stable
      format: tar.gz
      os: linux
      arch: arm

